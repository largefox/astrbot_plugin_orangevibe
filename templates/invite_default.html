<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-screen-webfont@1.1.0/style.css" />
    <style>
        body {
            margin: 0;
            padding: 80px 0;
            background-color: #f8fbff;
            background-image:
                radial-gradient(at 0% 0%, hsla(210, 100%, 74%, 0.8) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(180, 100%, 76%, 0.8) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(200, 100%, 77%, 0.8) 0, transparent 50%);
            font-family: "LXGW WenKai Screen", "LXGW WenKai", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .card {
            width: 94%;
            max-width: 1200px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0, 118, 255, 0.15),
                inset 0 2px 0 0 rgba(255, 255, 255, 1);
            padding: 80px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .header-badge {
            background: linear-gradient(135deg, #0076ff, #00b4db);
            color: white;
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 4px;
            margin-bottom: 40px;
            box-shadow: 0 10px 20px rgba(0, 118, 255, 0.3);
        }

        .title {
            color: #333;
            font-size: 56px;
            font-weight: 800;
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.4;
            background: linear-gradient(to right, #0052d4, #4364f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #666;
            font-size: 32px;
            font-weight: 500;
            margin-bottom: 30px;
        }

        .desc-box {
            color: #555;
            font-size: 40px;
            font-weight: 400;
            margin-bottom: 40px;
            text-align: center;
            line-height: 1.7;
            max-width: 90%;
            background: rgba(0, 118, 255, 0.05);
            padding: 30px 50px;
            border-radius: 20px;
            border-left: 6px solid #0076ff;
        }

        .test-id-box {
            margin-top: 10px;
            color: #fff;
            font-size: 72px;
            font-weight: 900;
            background: linear-gradient(135deg, #ff6a00, #ee0979);
            padding: 30px 60px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(238, 9, 121, 0.3);
            text-align: center;
            letter-spacing: 4px;
            margin-bottom: 40px;
        }

        .invite-tip {
            color: #555;
            font-size: 36px;
            font-weight: 500;
            background: rgba(0, 0, 0, 0.05);
            padding: 20px 40px;
            border-radius: 20px;
            text-align: center;
        }

        .footer {
            margin-top: 60px;
            color: #aaa;
            font-size: 26px;
            text-align: center;
            white-space: pre-wrap;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="header-badge">🆕 全新鉴定发布</div>
        <div class="title">{{ vibe_title }}</div>
        <div class="subtitle">共包含 {{ q_count }} 道题目 · 作者: <span style="color:#0076ff; font-weight:bold;">{{ author_name
                }}</span></div>
        <div class="desc-box">{{ vibe_desc }}</div>

        <div class="test-id-box">{{ command_str }} {{ display_id }}</div>
        <div class="invite-tip">{{ invite_tip_text }}</div>

        <div class="footer">{{ footer_text }}</div>
    </div>
</body>

</html>
